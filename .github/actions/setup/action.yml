name: "Setup"
description: "Setup Node.js, pnpm, and install dependencies"

inputs:
  setup-env:
    description: "Whether to setup .env.local file"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Read Node version from mise.toml
      id: versions
      shell: bash
      run: |
        echo "node=$(grep -E '^node\s*=' mise.toml | sed 's/.*=\s*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

    - name: Install pnpm
      uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ steps.versions.outputs.node }}
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline

    - name: Setup environment
      if: inputs.setup-env == 'true'
      shell: bash
      run: cp .env.development .env.local
