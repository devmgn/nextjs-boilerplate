name: "Setup"
description: "Setup Node.js, pnpm, and install dependencies"

inputs:
  setup-env:
    description: "Whether to setup .env.local file"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Read Node version from mise.toml
      id: versions
      shell: bash
      run: |
        echo "node=$(grep -E '^node\s*=' mise.toml | sed 's/.*=\s*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

    - name: Install pnpm
      uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: ${{ steps.versions.outputs.node }}
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline

    - name: Setup environment
      if: inputs.setup-env == 'true'
      shell: bash
      run: cp .env.development .env.local
