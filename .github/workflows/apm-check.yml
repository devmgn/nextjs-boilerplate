name: Check APM lockfile

on:
  push:
    branches-ignore:
      - main
    paths:
      - "apm.yml"
      - "apm.lock.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Check-Lock:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup mise (installs apm-cli pinned in mise.toml)
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      # Regenerate the lockfile and fail if it drifts from what is committed.
      # `apm install` preserves `generated_at` when nothing changed, so a plain
      # `git diff` is stable and only trips on real content drift.
      - name: Verify apm.lock.yaml is up to date
        run: |
          apm install -t claude
          if ! git diff --exit-code apm.lock.yaml; then
            echo "::error file=apm.lock.yaml::apm.lock.yaml is out of date. Run 'apm install -t claude' locally and commit the result."
            exit 1
          fi
          echo "apm.lock.yaml is up to date."
