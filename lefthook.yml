#
#   Refer for explanation to following link:
#   https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "*.{js,ts,jsx,tsx}"
      run: yarn biome write {staged_files}
    tsc:
      glob: "*.{js,ts,jsx,tsx}"
      run: 'bash -c "yarn tsc"' {staged_files}
    jest:
      glob: "*.{js,ts,jsx,tsx}"
      run: yarn test {staged_files}
